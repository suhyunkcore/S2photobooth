<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>My Photo Booth</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <section id="cameraScreen">
    <h1>My Photo Booth</h1>

    <video id="video" autoplay playsinline></video>

    <div class="control-box">
      <select id="filterSelect">
        <option value="none">기본</option>
        <option value="grayscale(100%)">흑백</option>
        <option value="sepia(60%) contrast(110%)">빈티지</option>
        <option value="brightness(120%)">밝게</option>
        <option value="contrast(130%)">선명하게</option>
      </select>

      <h2 id="countdown"></h2>

      <button id="captureBtn">사진 촬영</button>
      <button id="resetBtn">다시 찍기</button>
    </div>

    <p id="photoCount">0 / 4</p>
  </section>

  <section id="resultScreen" class="hidden">
    <h1>완성된 네컷사진</h1>

    <canvas id="canvas" width="600" height="1800"></canvas>

    <h3>프레임 선택</h3>

    <div class="frame-buttons">
      <button class="frameBtn" data-frame="frame1.png">프레임 1</button>
      <button class="frameBtn" data-frame="frame2.png">프레임 2</button>
      <button class="frameBtn" data-frame="frame3.png">프레임 3</button>
    </div>

    <button id="downloadBtn">사진 저장</button>
    <button id="backBtn">다시 촬영하기</button>
  </section>

  <script src="script.js?v=4"></script>
</body>
</html>
