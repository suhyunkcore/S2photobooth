<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>My Photo Booth</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <section id="cameraScreen">
    <h1 class="main-title">MY PHOTO BOOTH</h1>

    <video id="video" autoplay playsinline></video>

    <div class="filter-buttons">

     <button class="filterBtn selected" data-filter="none">
      <img src="filter1.png">
     </button>

     <button class="filterBtn" data-filter="grayscale(100%)">
      <img src="filter2.png">
     </button>

     <button class="filterBtn" data-filter="sepia(60%)">
      <img src="filter3.png">
     </button>

    </div>

<div class="control-buttons">

  <button id="captureBtn" class="image-button">
    <img src="shoot-btn.png">
  </button>

  <button id="resetBtn" class="image-button">
    <img src="reset-btn.png">
  </button>

</div>

</div>

      <h2 id="countdown"></h2>

    <p id="photoCount">0 / 4</p>
  </section>

  <section id="resultScreen" class="hidden">
    <h1>완성된 네컷사진</h1>

    <canvas id="canvas" width="600" height="1800"></canvas>

    <h3>프레임 선택</h3>

    <div class="frame-buttons">
      <button class="frameBtn" data-frame="frame1.png">프레임 1</button>
      <button class="frameBtn" data-frame="frame2.png">프레임 2</button>
      <button class="frameBtn" data-frame="frame3.png">프레임 3</button>
    </div>

    <button id="downloadBtn">사진 저장</button>
    <button id="backBtn">다시 촬영하기</button>
  </section>

  <script src="script.js?v=4"></script>
</body>
</html>
